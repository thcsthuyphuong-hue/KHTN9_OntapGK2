<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game học tập KHTN 9</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:Arial;
background:#f0f4f8;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.btn-option{
border:2px solid #ddd;
padding:10px;
border-radius:10px;
margin-bottom:8px;
width:100%;
text-align:left;
}

.btn-option.selected{
border-color:#2563eb;
background:#e0e7ff;
}

</style>

</head>


<body class="min-h-screen flex flex-col">

<div id="game-header" class="hidden bg-white shadow p-3 flex justify-between">

<div>
<span id="header-name"></span> -
<span id="header-sbd"></span> -
Lớp <span id="header-class"></span>
</div>

<div>

⏱ <span id="timer">00:00</span>

</div>

</div>


<main class="flex-grow container mx-auto max-w-2xl p-4">


<div id="screen-welcome" class="card">

<h2 class="text-xl font-bold mb-4">Ôn tập KHTN 9</h2>

<input id="input-name" placeholder="Họ tên" class="border p-2 w-full mb-2">

<input id="input-sbd" placeholder="SBD" class="border p-2 w-full mb-2">

<input id="input-class" placeholder="Lớp" class="border p-2 w-full mb-2">

<input id="input-school" placeholder="Trường" class="border p-2 w-full mb-4">

<button onclick="startGame()" class="bg-blue-600 text-white px-4 py-2 rounded">

Bắt đầu

</button>

</div>



<div id="screen-quiz" class="hidden card">

<div id="question-container"></div>

<div class="flex justify-between mt-4">

<button onclick="changeQuestion(-1)">Quay lại</button>

<button onclick="changeQuestion(1)">Tiếp</button>

<button onclick="finishGame()">Nộp bài</button>

</div>

</div>



<div id="screen-result" class="hidden card text-center">

<h2>Kết quả</h2>

<div id="result-score" class="text-3xl font-bold"></div>

</div>


</main>



<script>

const QUESTION_BANK = {

mcq:[
{question:"2+2=?",options:["3","4","5","6"],correctAnswer:1},
{question:"3+3=?",options:["6","7","8","9"],correctAnswer:0},
{question:"5+5=?",options:["9","10","11","12"],correctAnswer:1}
],

truefalse:[],

short:[]

};


let currentQuestions=[];
let currentIndex=0;
let userAnswers={};
let startTime=null;



function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}



function shuffleOptions(q){

const arr=q.options.map((o,i)=>({text:o,index:i}));

shuffle(arr);

const newOptions=arr.map(x=>x.text);

const newCorrect=arr.findIndex(x=>x.index===q.correctAnswer);

return {...q,options:newOptions,correctAnswer:newCorrect};

}



function generateTest(){

const mcqs=shuffle([...QUESTION_BANK.mcq])

.slice(0,QUESTION_BANK.mcq.length)

.map(q=>shuffleOptions(q));

currentQuestions=[...mcqs];

currentIndex=0;

userAnswers={};

}



function startGame(){

const info={

name:document.getElementById("input-name").value,

sbd:document.getElementById("input-sbd").value,

class:document.getElementById("input-class").value,

school:document.getElementById("input-school").value

};

localStorage.setItem("student_info",JSON.stringify(info));

startTime=new Date();

document.getElementById("screen-welcome").classList.add("hidden");

document.getElementById("screen-quiz").classList.remove("hidden");

generateTest();

renderQuestion();

}



function renderQuestion(){

const q=currentQuestions[currentIndex];

const container=document.getElementById("question-container");

container.innerHTML="";

const title=document.createElement("h3");

title.innerText="Câu "+(currentIndex+1)+": "+q.question;

container.appendChild(title);



q.options.forEach((opt,i)=>{

const btn=document.createElement("button");

btn.className="btn-option"+(userAnswers[currentIndex]==i?" selected":"");

btn.innerText=opt;

btn.onclick=()=>{

userAnswers[currentIndex]=i;

renderQuestion();

};

container.appendChild(btn);

});

}



function changeQuestion(dir){

currentIndex+=dir;

if(currentIndex<0)currentIndex=0;

if(currentIndex>=currentQuestions.length)

currentIndex=currentQuestions.length-1;

renderQuestion();

}



function calculateScore(){

let score=0;

currentQuestions.forEach((q,i)=>{

if(userAnswers[i]==q.correctAnswer)score+=1;

});

return score;

}



function finishGame(){

const score=calculateScore();

document.getElementById("screen-quiz").classList.add("hidden");

document.getElementById("screen-result").classList.remove("hidden");

document.getElementById("result-score").innerText="Điểm: "+score;



const info=JSON.parse(localStorage.getItem("student_info"));



if(window.db){

import("https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js")

.then(({collection,addDoc})=>{

addDoc(collection(db,"results"),{

name:info.name,

sbd:info.sbd,

class:info.class,

school:info.school,

score:score,

duration:Math.floor((new Date()-startTime)/1000),

submitTime:new Date().toISOString()

});

});

}

}

</script>

</body>
</html>
