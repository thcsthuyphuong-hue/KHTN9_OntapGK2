<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng xếp hạng học sinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 p-6">

    <h1 class="text-2xl font-bold text-blue-700 mb-6">📊 BẢNG XẾP HẠNG HỌC SINH</h1>

    <div class="mb-4 flex flex-wrap gap-4 items-center bg-blue-50 p-4 rounded-lg shadow">
        <div>
            <label class="font-bold text-blue-800 block text-sm">Sắp xếp theo:</label>
            <select id="sort-type" onchange="renderTable()" class="border p-2 rounded shadow-sm">
                <option value="score_desc">Điểm số (Cao xuống thấp)</option>
                <option value="submitTime_desc">Thời gian nộp (Mới nhất)</option>
                <option value="class_asc">Lớp (A -> Z)</option>
                <option value="sbd_asc">Số báo danh (Tăng dần)</option>
                <option value="duration_asc">Thời gian làm bài (Nhanh nhất)</option>
            </select>
        </div>

        <div>
            <label class="font-bold text-blue-800 block text-sm">Lọc theo lớp:</label>
            <select id="filterClass" onchange="renderTable()" class="border p-2 rounded shadow-sm">
                <option value="">Tất cả lớp</option>
            </select>
        </div>

        <div class="flex gap-2 self-end">
            <button onclick="fetchData()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">Làm mới dữ liệu</button>
            <button onclick="exportExcel()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 transition">Xuất Excel</button>
        </div>
    </div>

    <div class="overflow-x-auto bg-white rounded-lg shadow">
        <table class="w-full text-left border-collapse">
            <thead class="bg-blue-600 text-white">
                <tr>
                    <th class="p-3 text-center border">Hạng</th>
                    <th class="p-3 border">Tên học sinh</th>
                    <th class="p-3 text-center border">SBD</th>
                    <th class="p-3 text-center border">Lớp</th>
                    <th class="p-3 text-center border">Trường</th>
                    <th class="p-3 text-center border">Điểm</th>
                    <th class="p-3 text-center border">Thời gian làm (s)</th>
                    <th class="p-3 text-center border">Ngày nộp</th>
                </tr>
            </thead>
            <tbody id="result-tbody">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5zISc-3_Fc-NZRrqrA4OezGGNR3j6kMQ",
            authDomain: "khtn9-ontapgk2.firebaseapp.com",
            projectId: "khtn9-ontapgk2",
            storageBucket: "khtn9-ontapgk2.appspot.com",
            messagingSenderId: "1054675478842",
            appId: "1:1054675478842:web:54e8bb2dbf3e5aec6c0803"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allResults = [];
        let displayedResults = [];

        // 1. Hàm lấy dữ liệu từ Firebase
        async function fetchData() {
            const tbody = document.getElementById('result-tbody');
            tbody.innerHTML = '<tr><td colspan="8" class="p-10 text-center">Đang tải dữ liệu...</td></tr>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "results"));
                allResults = [];
                querySnapshot.forEach((doc) => {
                    allResults.push({ id: doc.id, ...doc.data() });
                });
                
                updateClassFilter();
                renderTable();
            } catch (e) {
                console.error("Lỗi:", e);
                tbody.innerHTML = '<tr><td colspan="8" class="p-10 text-center text-red-500">Lỗi khi tải dữ liệu!</td></tr>';
            }
        }

        // 2. Cập nhật danh sách lớp vào Select
        function updateClassFilter() {
            const select = document.getElementById("filterClass");
            const classes = [...new Set(allResults.map(item => item.class))].filter(Boolean).sort();
            select.innerHTML = '<option value="">Tất cả lớp</option>';
            classes.forEach(c => {
                select.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        // 3. Hàm Sắp xếp, Lọc và Hiển thị
        window.renderTable = function() {
            const sortType = document.getElementById('sort-type').value;
            const filterClass = document.getElementById('filterClass').value;
            
            // Lọc dữ liệu theo lớp
            let data = filterClass ? allResults.filter(item => item.class === filterClass) : [...allResults];

            // Sắp xếp dữ liệu
            data.sort((a, b) => {
                switch(sortType) {
                    case 'score_desc': return (b.score || 0) - (a.score || 0);
                    case 'class_asc': return (a.class || "").localeCompare(b.class || "");
                    case 'sbd_asc': return (a.sbd || "").localeCompare(b.sbd || "");
                    case 'duration_asc': return (a.duration || 0) - (b.duration || 0);
                    case 'submitTime_desc': return (b.submitTime || 0) - (a.submitTime || 0);
                    default: return 0;
                }
            });

            displayedResults = data; // Lưu lại để xuất Excel đúng những gì đang thấy
            const tbody = document.getElementById('result-tbody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="p-10 text-center text-gray-500">Không có dữ liệu phù hợp.</td></tr>';
                return;
            }

            data.forEach((item, index) => {
                const date = item.submitTime ? new Date(item.submitTime).toLocaleString('vi-VN') : "---";
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="p-3 text-center border font-bold">${index + 1}</td>
                        <td class="p-3 border">${item.name || '---'}</td>
                        <td class="p-3 text-center border">${item.sbd || '---'}</td>
                        <td class="p-3 text-center border">${item.class || '---'}</td>
                        <td class="p-3 text-center border text-sm">${item.school || '---'}</td>
                        <td class="p-3 text-center border font-bold text-blue-700 text-lg">${(item.score || 0).toFixed(2)}</td>
                        <td class="p-3 text-center border">${item.duration || 0}s</td>
                        <td class="p-3 text-center border text-xs text-gray-600">${date}</td>
                    </tr>
                `;
            });
        }

        // 4. Hàm xuất Excel
        window.exportExcel = function() {
            if (displayedResults.length === 0) {
                alert("Không có dữ liệu để xuất!");
                return;
            }
            const excelData = displayedResults.map((d, i) => ({
                "Hạng": i + 1,
                "Họ Tên": d.name || "",
                "SBD": d.sbd || "",
                "Lớp": d.class || "",
                "Trường": d.school || "",
                "Điểm": d.score || 0,
                "Thời gian làm (s)": d.duration || 0,
                "Thời gian nộp": d.submitTime ? new Date(d.submitTime).toLocaleString("vi-VN") : ""
            }));
            const worksheet = XLSX.utils.json_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "KetQua");
            XLSX.writeFile(workbook, "bang_xep_hang_hoc_sinh.xlsx");
        }

        // Khởi chạy lấy dữ liệu lần đầu
        fetchData();
        window.fetchData = fetchData;

    </script>
</body>
</html>
